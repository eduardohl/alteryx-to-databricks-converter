name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ server/
      - run: ruff format --check src/ tests/ server/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src/a2d/ && mypy server/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[all]"
      - run: pytest tests/ -v --tb=short --cov=a2d --cov-report=term-missing

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all]" pip-audit
      - run: pip-audit --skip-editable

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run build

  bundle-validate:
    runs-on: ubuntu-latest
    # `databricks bundle validate` tries to hit `/api/2.0/preview/scim/v2/Me`
    # against the configured DATABRICKS_HOST — it cannot fully validate
    # without real credentials + a real workspace. We still run it so any
    # YAML-shape regressions show up as warnings, but we don't block the
    # build on it. Real validation happens at deploy time via
    # `make deploy-dev` / `make deploy-prod`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate
        env:
          DATABRICKS_HOST: https://example.cloud.databricks.com
          DATABRICKS_TOKEN: dapi-placeholder-for-ci-validation-only
